name: Build Godot Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: '4.6'
  GODOT_PLATFORM: 'linux.x86_64'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      # ==================== 1. Checkout ====================
      - name: Checkout
        uses: actions/checkout@v4
        
      # ==================== 2. Godot 引擎 ====================
      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_${GODOT_PLATFORM}.zip -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_${GODOT_PLATFORM}
          ls -la Godot*
          
      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          echo \"Templates installed\"
          ls ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          
      # ==================== 3. Java 17 ====================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          
      # ==================== 4. 手动安装 Android SDK ====================
      - name: Download Android Command Line Tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          ls -la $HOME/android-sdk/cmdline-tools/latest/
          
      - name: Install Android SDK Components
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          yes | sdkmanager --licenses 2>/dev/null || true
          
          echo \"=== Installing Android SDK packages ===\"
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125" \
            "platform-tools" \
            2>&1 | tail -20
            
          echo \"=== Installed packages ===\"
          sdkmanager --list_installed
          
      - name: Verify Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          echo \"ANDROID_HOME=$ANDROID_HOME\"
          sdkmanager --list_installed | grep -E \"platforms|build-tools|ndk\"
          
      # ==================== 5. 生成密钥库 ====================
      - name: Create debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Debug, O=Debug, C=US"
          ls -la debug.keystore
          
      # ==================== 6. 构建 APK ====================
      - name: Build Debug APK
        id: build
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          echo \"=== Project structure ===\"
          ls -la
          
          echo \"=== Checking for custom Android build ===\"
          if [ -d \"android/build\" ]; then
            echo \"Custom Android build directory found\"
            ls -la android/
            ls -la android/build/ 2>/dev/null || true
          fi
          
          # 复制密钥
          cp debug.keystore android/build/ 2>/dev/null || true
          
          # 尝试使用 Gradle 构建（如果存在）
          if [ -f \"android/build/gradlew\" ]; then
            echo \"=== Building with Gradle ===\"
            cd android/build
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon 2>&1 | tail -100
            cd ../..
          else
            echo \"=== Building with Godot headless ===\"
            ./Godot_v${GODOT_VERSION}-stable_${GODOT_PLATFORM} --headless --export-release "Android" build/output.apk 2>&1 | tail -50
          fi
          
          echo \"=== Searching for APK files ===\"
          find . -name \"*.apk\" -type f 2>/dev/null
          
      # ==================== 7. 上传产物 ====================
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-android-apk
          path: |
            **/*.apk
            android/build/app/build/outputs/apk/debug/*.apk
            build/*.apk
          retention-days: 7
          
      - name: Build Summary
        run: |
          echo \"### Build Results\" >> $GITHUB_STEP_SUMMARY
          echo \"\`\`\`\" >> $GITHUB_STEP_SUMMARY
          find . -name \"*.apk\" -type f 2>/dev/null | head -10 >> $GITHUB_STEP_SUMMARY || echo \"No APK found\" >> $GITHUB_STEP_SUMMARY
          echo \"\`\`\`\" >> $GITHUB_STEP_SUMMARY
