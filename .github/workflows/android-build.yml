name: Build Godot Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: '4.6'
  GODOT_PLATFORM: 'linux.x86_64'
  
jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      # ==================== Godot ====================
      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_${GODOT_PLATFORM}.zip -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_${GODOT_PLATFORM}
          
      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          
      # ==================== Java ====================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # ==================== Android SDK ====================
      - name: Setup Android SDK
        uses: android/actions/setup-android-sdk@v3
        with:
          cmdline-tools: latest
          build-tools: 34.0.0
          packages: |
            platforms;android-34
            ndk;26.1.10909125
            
      - name: Create debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, O=Debug, C=US"
          
      # ==================== Build ====================
      - name: Build Debug APK (Custom Build)
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          
          # 复制密钥到项目目录
          cp debug.keystore android/build/
          
          # 进入 Android 目录进行 Gradle 构建
          cd android/build
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -50
          
          # 查找输出的 APK
          find . -name '*.apk' -type f
          
      # ==================== Upload ====================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: godot-android-apk
          path: |
            android/build/build/outputs/apk/debug/*.apk
            android/build/app/build/outputs/apk/debug/*.apk
          retention-days: 7
          
      - name: List Build Outputs
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "No APK found in android folder"